services:
  - type: web
    name: llm-tutor-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python download_all_models.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - fromGroup: llm-tutor-secrets
